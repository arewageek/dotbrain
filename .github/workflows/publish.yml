name: Publish to NPM and GitHub Packages

on:
  release:
    types: [created, published]
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to publish to GitHub Packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. PUBLISH TO PUBLIC NPM ---
      - name: Setup Node.js for NPM
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to NPM Registry
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- 2. PUBLISH TO GITHUB PACKAGES ---
      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          registry-url: 'https://npm.pkg.github.com'
          scope: '@${{ github.repository_owner }}'

      - name: Dynamically scope package name for GitHub
        run: |
          npm pkg set name="@${{ github.repository_owner }}/create-dotbrain"
          npm pkg set repository.url="https://github.com/${{ github.repository }}"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
